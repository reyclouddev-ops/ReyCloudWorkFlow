<!DOCTYPE html>
<html>

<head>

<title>ReyDeploy Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="layout">


<!-- Sidebar -->

<div class="sidebar">

<h2>
🚀 ReyCloudWorkFlow
</h2>


<button>
🏠 Dashboard
</button>


<button>
📦 Deploy
</button>


<button>
📜 History
</button>


<button>
⚙️ Settings
</button>


</div>





<!-- Main -->

<div class="main">


<div class="profile">


<img id="avatar">


<div>

<h2>
👋 Hallo,
<span id="username">
User
</span>
</h2>


<p id="status">
Checking...
</p>


</div>


</div>





<div class="card">


<h2>
📦 Upload Project
</h2>


<input 
type="file"
id="file">


<p id="uploadStatus">
Belum upload
</p>


</div>






<div class="card">


<h2>
🐙 Repository</h2>


<select id="repos">

</select>


<button onclick="createRepo()">

➕ Create Repository

</button>


</div>





<div class="card">


<h2>
☁️ Deploy Vercel
</h2>


<input 
id="projectName"
placeholder="Nama Project">


<button onclick="deploy()">

🚀 Deploy Sekarang

</button>


<p id="deployStatus">

</p>


</div>





<div class="card">


<h2>
📜 History

</h2>


<div id="history">

Loading...

</div>


</div>



</div>


</div>



<script src="app.js"></script>

</body>

</html>
