<!DOCTYPE html>
<html>

<head>

<title>ReyCloudWorkFlow Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="layout">


<!-- Sidebar -->

<div class="sidebar">

<h2>
🚀 ReyCloudWorkFlow
</h2>


<button>
🏠 Dashboard
</button>


<button>
📦 Deploy
</button>


<button>
📜 History
</button>


<button>
⚙️ Settings
</button>


</div>





<!-- Main -->

<div class="main">



<!-- PROFILE -->

<div class="profile">


<img id="avatar">


<div>

<h2>
👋 Hallo,
<span id="username">
User
</span>
</h2>


<p id="githubUser">
Github
</p>


<p id="status">
Checking...
</p>


</div>


</div>







<!-- UPLOAD -->

<div class="card">


<h2>
📦 Upload Project
</h2>


<input

type="file"

id="file"

accept=".zip,.rar,.7z"

onchange="uploadProject()"

>


<p id="uploadStatus">

Belum upload

</p>


</div>








<!-- REPOSITORY -->

<div class="card">


<h2>
🐙 Repository
</h2>



<select id="repos">

<option>
Loading...
</option>


</select>




<button onclick="createRepo()">

➕ Create Repository

</button>


</div>








<!-- PROJECT -->

<div class="card">


<h2>
⚙️ Project Setting
</h2>



<input

id="projectName"

placeholder="Nama Project"

>



</div>








<!-- DEPLOY -->

<div class="card">


<h2>
☁️ Deploy Vercel
</h2>



<button onclick="deployNow()">

🚀 DEPLOY NOW

</button>




<p id="deployStatus">

Ready

</p>



</div>








<!-- HISTORY -->

<div class="card">


<h2>
📜 Deployment History

</h2>



<div id="history">

Loading...

</div>



</div>





</div>

</div>





<script src="app.js"></script>


</body>


</html>
